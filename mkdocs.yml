site_name: glia
site_description: A glass-box, minimal library for building LLM agents.
site_url: https://denisdrobyshev.github.io/glia/
repo_url: https://github.com/DenisDrobyshev/glia
repo_name: DenisDrobyshev/glia
copyright: MIT-licensed · built by Denis Drobyshev

theme:
  name: material
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - content.code.copy
    - content.code.annotate
    - search.suggest

plugins:
  - search
  - i18n:
      docs_structure: suffix
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: ru
          name: Русский
          build: true

markdown_extensions:
  - admonition
  - attr_list
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.details

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Guide: guide.md
  - Desktop app: app.md
  - Architecture: ARCHITECTURE.md
  - Strategy: STRATEGY.md
  - Roadmap: ROADMAP.md
