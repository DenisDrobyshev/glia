<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <style>
    /* Elements default to visible (the final frame), so the image still reads
       as a full screenshot if a viewer's browser doesn't run SVG animations. */
    .a { animation: 9s infinite; }
    .t1 { animation-name: k1; } .t2 { animation-name: k2; } .t3 { animation-name: k3; }
    .t4 { animation-name: k4; } .t5 { animation-name: k5; } .t6 { animation-name: k6; }
    .t7 { animation-name: k7; } .t8 { animation-name: k8; }
    @keyframes k1 { 0%,6%{opacity:0} 8%,100%{opacity:1} }
    @keyframes k2 { 0%,14%{opacity:0} 16%,100%{opacity:1} }
    @keyframes k3 { 0%,22%{opacity:0} 24%,100%{opacity:1} }
    @keyframes k4 { 0%,31%{opacity:0} 33%,100%{opacity:1} }
    @keyframes k5 { 0%,41%{opacity:0} 43%,100%{opacity:1} }
    @keyframes k6 { 0%,50%{opacity:0} 52%,100%{opacity:1} }
    @keyframes k7 { 0%,58%{opacity:0} 60%,100%{opacity:1} }
    @keyframes k8 { 0%,78%{opacity:0} 80%,100%{opacity:1} }
    .cursor { animation: blink .9s steps(2) infinite; }
    @keyframes blink { 50% { opacity: 0; } }
    .pulse { animation: pulse 2.4s ease-in-out infinite; transform-origin: center; }
    @keyframes pulse { 50% { opacity: .35; } }
  </style>
  <defs><clipPath id="win"><rect x="20" y="20" width="1160" height="640" rx="14"/></clipPath></defs>
  <rect width="1200" height="680" fill="#e9ecec"/>
  <g clip-path="url(#win)">
    <rect x="20" y="20" width="1160" height="640" fill="#f6f5f2"/>
    <!-- header -->
    <rect x="20" y="20" width="1160" height="54" fill="#ffffff"/>
    <line x1="20" y1="74" x2="1180" y2="74" stroke="#eae7e0"/>
    <rect x="44" y="37" width="21" height="21" rx="7" fill="#0d9488"/>
    <text x="74" y="53" font-size="19" font-weight="650" fill="#23261f">glia <tspan font-size="12" font-weight="500" fill="#7c7d73">shell</tspan></text>
    <rect x="152" y="37" width="60" height="21" rx="10" fill="#0d9488"/>
    <text x="182" y="52" font-size="11.5" fill="#fff" text-anchor="middle">Claude</text>
    <g fill="#7c7d73" font-size="13">
      <text x="905" y="52" text-anchor="middle">Glass box</text>
      <text x="1000" y="52" text-anchor="middle">New chat</text>
      <text x="1090" y="52" text-anchor="middle">Settings</text>
      <text x="1150" y="52" text-anchor="middle">Quit</text>
    </g>

    <!-- chat -->
    <g class="a t1">
      <rect x="452" y="104" width="348" height="42" rx="16" fill="#0d9488"/>
      <text x="474" y="130" font-size="15" fill="#fff">What's the weather in Paris?</text>
    </g>
    <g class="a t7">
      <rect x="44" y="168" width="372" height="42" rx="16" fill="#fff" stroke="#eae7e0"/>
      <text x="66" y="194" font-size="15" fill="#23261f">It's 18°C and cloudy in Paris.</text>
      <rect class="cursor" x="356" y="180" width="2.5" height="17" fill="#0d9488"/>
    </g>

    <!-- composer -->
    <rect x="44" y="596" width="640" height="44" rx="16" fill="#f6f5f2" stroke="#eae7e0"/>
    <text x="62" y="623" font-size="14" fill="#a6a79c">Message glia…</text>
    <rect x="612" y="602" width="66" height="32" rx="11" fill="#0d9488"/>
    <text x="645" y="623" font-size="13.5" fill="#fff" text-anchor="middle" font-weight="600">Send</text>

    <!-- glass box -->
    <rect x="800" y="74" width="380" height="586" fill="#0f1513"/>
    <line x1="800" y1="74" x2="800" y2="660" stroke="#eae7e0"/>
    <circle class="pulse" cx="828" cy="105" r="3.5" fill="#2dd4bf"/>
    <text x="842" y="109" font-size="11.5" letter-spacing="1.4" fill="#9fc9c2" opacity=".7">GLASS BOX · LIVE EVENTS</text>
    <line x1="800" y1="124" x2="1180" y2="124" stroke="rgba(255,255,255,.07)"/>
    <g font-family="ui-monospace, Menlo, Consolas, monospace" font-size="12.5">
      <text class="a t2" x="824" y="156" fill="#8aa6a1">• run_started</text>
      <text class="a t3" x="824" y="184" fill="#cfe6e2">• model_call        <tspan fill="#8aa6a1">step 1</tspan></text>
      <text class="a t4" x="824" y="212" fill="#7dd3fc">• tool_called       get_weather(city)</text>
      <text class="a t5" x="824" y="240" fill="#86efac">• tool_returned     "18°C, cloudy"</text>
      <text class="a t6" x="824" y="268" fill="#cfe6e2">• model_call        <tspan fill="#8aa6a1">step 2</tspan></text>
      <text class="a t8" x="824" y="296" fill="#8aa6a1">• run_finished      end_turn</text>
    </g>
    <line x1="800" y1="632" x2="1180" y2="632" stroke="rgba(255,255,255,.07)"/>
    <text x="824" y="651" font-size="11" fill="#5f7a75">Every model call, tool call, and approval — as the library emits them.</text>
  </g>
  <rect x="20.5" y="20.5" width="1159" height="639" rx="14" fill="none" stroke="#dcdad3"/>
</svg>
